<app-header />
<main>
  <ul id="users">
    @for (user of users; track user.id) {
      <li>
        <app-user [selected]="user.id === selectedUserId()" [id]="user.id" [avatar]="user.avatar" [name]="user.name" (select)="onSelectUser($event)" />
      </li>
    }
  </ul>

  @if (selectedUser()) {
    <app-tasks [name]="selectedUserName()" [userId]="selectedUserId()" />
  }@else {
    <p id="fallback">Select user to see tasks </p>
  }

</main>
