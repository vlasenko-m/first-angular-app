<section>
  <header>
    <h2>{{ name }}'s Tasks</h2>

    @if (isAddingTask()) {
      <app-add-task (addTask)="onCloseAddTask($event)" (cancel)="onCancelAddTask()"></app-add-task>
    } @else {
      <menu>
        <button (click)="onAddTask()">Add Task</button>
      </menu>
    }
  </header>

  <ul>
    <li>
      @for (task of userTasks; track task.id) {
        <app-task [task]="task" (markAsComplete)="onMarkAsComplete($event)" />
      }
    </li>
  </ul>
</section>
