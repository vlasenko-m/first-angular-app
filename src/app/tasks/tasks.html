<section>
  <header>
    <h2>{{ name }}'s Tasks</h2>

    @if (isAddingTask()) {
      <app-add-task [userId]="userId" (cancel)="onCloseAddTaskModal()"></app-add-task>
    } @else {
      <menu>
        <button (click)="onOpenAddTaskModal()">Add Task</button>
      </menu>
    }
  </header>

  <ul>
    <li>
      @for (task of userTasks; track task.id) {
        <app-task [task]="task" />
      }
    </li>
  </ul>
</section>
